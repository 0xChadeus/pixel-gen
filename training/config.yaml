model:
  architecture: edm_unet
  base_channels: 128
  channel_mults: [1, 2, 3, 4]
  num_res_blocks: 3
  attention_resolutions: [32, 16]
  num_heads: 8
  cond_dim: 512
  cross_attn_dim: 512
  dropout: 0.15
  in_channels: 4
  self_condition: true
  color_space: oklab
  sigma_data: 0.5

diffusion:
  sigma_min: 0.002
  sigma_max: 80.0
  P_mean: -0.853
  P_std: 1.2

training:
  batch_size: 4
  gradient_accumulation: 16
  max_vram_gb: 18.0
  learning_rate: 1.0e-4
  warmup_steps: 2000
  total_steps: 500000
  ema_decay: 0.9999
  mixed_precision: fp16
  weight_decay: 0.01
  grad_clip_norm: 1.0
  cond_drop_text: 0.1
  cond_drop_palette: 0.1
  cond_drop_both: 0.10
  sample_every: 2000
  log_every: 100
  save_every: 10000
  keep_checkpoints: 5

data:
  data_dir: ./data/processed
  num_workers: 4
  pin_memory: true
